name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Versions-Konsistenz prüfen (Tag muss zu __version__ passen)
        run: |
          PKG_VERSION="v$(python -c 'from localflow import __version__; print(__version__)')"
          if [ "$PKG_VERSION" != "${GITHUB_REF_NAME}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} passt nicht zu localflow/__init__.py (${PKG_VERSION}). Version dort bumpen und neu taggen."
            exit 1
          fi

      - name: Tests (Sicherheitsnetz vor dem Release)
        run: python -m pytest tests/ -q --ignore=tests/test_e2e.py

      - name: xcodegen installieren (Swift-App-Projekt, seit Phase 3.4)
        run: brew install xcodegen

      - name: DMG bauen
        run: bash packaging/build_dmg.sh

      - name: DMG-Existenz prüfen
        run: ls -la dist/*.dmg

      - name: GitHub Release erstellen
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/LocalFlow-*.dmg \
            --title "LocalFlow ${GITHUB_REF_NAME}" \
            --generate-notes
