name: LocalFlow
options:
  bundleIdPrefix: studio.minh
targets:
  LocalFlow:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: LocalFlow
    settings:
      base:
        # Phase 3.4: echte Bundle-ID/Produktname — die Swift-Hülle IST jetzt
        # die Produktions-App, kein paralleles -Dev-Bundle mehr nötig (die
        # Python-App lief bis hierhin unter genau dieser Identität).
        PRODUCT_NAME: LocalFlow
        PRODUCT_BUNDLE_IDENTIFIER: studio.minh.localflow
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "LocalFlow wandelt deine Sprache lokal in Text um."
        INFOPLIST_KEY_NSHumanReadableCopyright: "MIT — Minh Nguyen"
        # Ad-hoc als Xcode-Default; build_dmg.sh signiert danach per Shell mit
        # der stabilen Release-Identität nach (siehe packaging/setup_signing.sh),
        # build_swift.sh macht dasselbe für lokale Testbuilds.
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: YES
